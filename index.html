<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Star Board — Framework Test</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <header class="app-header">
      <h1>STAR BOARD</h1>
      <p class="subtitle">framework test — placement &amp; upgrade only, combat not yet wired up</p>
    </header>

    <div class="layout">
      <aside class="panel" id="panel-p1"></aside>

      <main class="board-wrap">
        <div class="turn-indicator" id="turn-indicator"></div>
        <div class="board" id="board"></div>
        <div class="log" id="log"></div>
      </main>

      <aside class="panel" id="panel-p2"></aside>
    </div>
  </div>

  <script src="game/engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
